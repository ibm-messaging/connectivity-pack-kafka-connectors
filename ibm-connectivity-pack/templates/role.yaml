kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name:  {{ include "ibm-connectivity-pack.role" .}}
  namespace: {{ include "ibm-connectivity-pack.namespace" . }}
  labels:
    {{- include "ibm-connectivity-pack.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.annotations | nindent 4 }}
rules:
  - verbs:
      - get
      - list
    apiGroups:
      - ''
    resources:
      - services
      - endpoints
  - verbs:
      - get
      - list
      - update
      - patch
    apiGroups:
      - ''
    resources:
      - secrets
    resourceNames: 
      - {{ include "ibm-connectivity-pack.tokenStore" . | quote }}
---
{{- if eq .Values.skipHooks false }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: {{ include "ibm-connectivity-pack.namespace" . }}
  labels:
    {{- include "ibm-connectivity-pack.labels" . | nindent 4 }}
  name: {{ include "ibm-connectivity-pack.preHookJobRole" . }}
  annotations:
    "helm.sh/hook": pre-install, pre-upgrade, post-delete
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": hook-succeeded,hook-failed,before-hook-creation
    {{- toYaml .Values.annotations | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "update", "patch", "delete"]
    resourceNames:
      - {{ include "ibm-connectivity-pack.stunnelClient" . | quote }}
      - {{ include "ibm-connectivity-pack.stunnelServer" .| quote  }}
{{ end }}
